      - return_idler_z_front_right
      - return_idler_z_back_left
      - return_idler_z_back_right
      - drive_belt_z_front_left_a
      - drive_belt_z_front_left_b
      - drive_belt_z_front_right_a
      - drive_belt_z_front_right_b
      - drive_belt_z_back_left_a
      - drive_belt_z_back_left_b
      - drive_belt_z_back_right_a
      - drive_belt_z_back_right_b
      - drive_belt_y_left_a
      - drive_belt_y_left_b
      - drive_belt_y_right_a
      - drive_belt_y_right_b
      - motor_z_front_left
      - motor_z_back_left
      - motor_z_back_right
      - motor_z_front_right
      - motor_y_left
      - motor_y_right
      - motor_x
      - x_belt_pinion
    notes: >
      Z-axis drive train placed after the frame is complete: a GT2 20T drive
      pulley at the top of each post, a smooth return idler at the bottom, and
      two authored GT2 belt runs per post. Belts are gate-exempt stock lifted
      from the protected M3-2 source assembly; Y and X drives remain
      not_built_yet.

not_built_yet:
  # Pruned 2026-05-23 (resolved/validated/placed; recorded in the spec notes,
  # the internal frame-canon notes, and the FEA memory): connector-frame verification,
  # Y-belt routing (placed first-pass), Z-motor mounting, ZPMM BOM binding,
  # static side-rail joints, and the PyNite comparison sweep (frame physically
  # validated: 6kg center -> 0.3mm, matches PyNite). Only genuine future work
  # remains below.
  - item: motor mount plates (optional, deferred)
    reason: "Per the maintainer (2026-05-23): no separate motor mount plates are needed for now - the Y-axis NEMA screws directly to the C-beam; homing is sensorless via the stepper driver's StallGuard (a firmware feature, not a physical endstop). A plate may be added in a later version. All 7 motors are placed."
    required_for_release: false
  - item: printhead/tooling interface (deferred to a later version)
    reason: "Required for a complete machine but intentionally deferred to a later release version (the maintainer 2026-05-23): this canonical baseline is the frame + motion system; the printhead/tool payload comes later. The XLarge X-carriage plates + eight V-wheels that will carry it are placed and ready. (Stays required_for_release so --release mode correctly flags the machine as not yet complete.)"
    required_for_release: true

validation:
  expected_inventory:
    vertical_post: 4
    top_frame_rail_x: 4
    top_frame_insert_2040: 2
    top_frame_rail_y: 2
    top_center_spreader_2040: 1
    top_center_spreader_plate: 4
    bottom_frame_rail_y_2080: 2
    x_gantry_beam: 2
    x_gantry_insert_2040: 1
    x_gantry_plate: 2
    x_carriage_plate: 2
    y_gantry_beam: 2
    z_carriage_plate: 4
    v_wheel: 32
    frame_side_motor_mount_spacer_6mm: 4
    frame_side_flat_spacer_6mm: 4
    drive_pulley: 4
    return_idler: 4
    drive_belt: 12
    drive_motor: 7
    x_belt_pinion: 1
  run_checks:
    - inventory
    - interference
    - vslot_stackup
    - frame_adjacency
    - hole_alignment
    - wheel_alignment
    - open_channel_orientation
    - bbox_alignment
    - floating
    - dimensional
  interference:
    min_volume_mm3: 1.0
    min_clearance_mm: 1.0
    max_findings: 25
    skip_roles:
      - v_wheel
      - drive_pulley
      - return_idler
      - drive_belt
      - drive_motor
      - x_belt_pinion
    notes: >
      V-wheel bodies are intentionally tangent to or lightly engaged with rail
      slots and plate interfaces in this coarse reference; the wheel_alignment
      gate checks those wheel-to-plate placements instead of treating intended
      rolling contact as generic solid interference.
  vslot_stackup:
    plate_thickness_mm: 3.0
    running_gap_mm: 1.0
    thickness_tolerance_mm: 0.75
    position_tolerance_mm: 1.25
    min_spacer_mm: 5.0
    target_spacer_mm: 6.0
    candidate_spacer_mm: [5.0, 6.0]
    known_too_small_mm: [4.0]
    notes: >
      CADCLAW treats the V-slot/C-Beam handoff stack as a general placement
      invariant. Every handoff (X-to-Y, X-carriage, Y-to-Z) uses the small 3mm
      V-Slot 20-80 plate. For the Y-to-Z handoff, the 6mm spacer is not inserted
      into the moving stack; the Z post is placed 2mm outside the gantry plate,
      while the 6mm spacer/motor-mount is checked in the static frame joint.
    handoffs:
      - id: x_to_y_left
        current_instance: x_gantry_beam_left
        plate_instance: x_gantry_plate_left
        next_instance: y_gantry_left
        axis: x
        side: negative
        plate_thickness_mm: 3.0
      - id: x_to_y_right
        current_instance: x_gantry_beam_right
        plate_instance: x_gantry_plate_right
        next_instance: y_gantry_right
        axis: x
        side: positive
        plate_thickness_mm: 3.0
      - id: y_to_z_front_left
        current_instance: y_gantry_left
        plate_instance: z_carriage_plate_front_left
        next_instance: post_front_left
        axis: y
        side: negative
        plate_gap_mm: 1.0
        next_gap_mm: 2.0
      - id: y_to_z_front_right
        current_instance: y_gantry_right
        plate_instance: z_carriage_plate_front_right
        next_instance: post_front_right
        axis: y
        side: negative
        plate_gap_mm: 1.0
        next_gap_mm: 2.0
      - id: y_to_z_back_left
        current_instance: y_gantry_left
        plate_instance: z_carriage_plate_back_left
        next_instance: post_back_left
        axis: y
        side: positive
        plate_gap_mm: 1.0
        next_gap_mm: 2.0
      - id: y_to_z_back_right
        current_instance: y_gantry_right
        plate_instance: z_carriage_plate_back_right
        next_instance: post_back_right
        axis: y
        side: positive
        plate_gap_mm: 1.0
        next_gap_mm: 2.0
  frame_adjacency:
    gap_mm: 0.0
    position_tolerance_mm: 0.5
    min_overlap_mm: 20.0
    notes: >
      Static frame C-Beam/post joints are checked separately from moving
      V-slot stackups. A pass here means the declared frame members are flush
      and have real bearing overlap; a gap means either the transform is wrong
      or an authored connector/spacer STEP must be added explicitly.
    joints:
      - id: top_front_left_post_to_x_rail
        from_instance: post_front_left
        to_instance: top_front_rail
        axis: x
        side: positive
      - id: top_front_right_post_to_x_rail
        from_instance: post_front_right
        to_instance: top_front_rail_splice
        axis: x
        side: negative
      - id: top_back_left_post_to_x_rail
        from_instance: post_back_left
        to_instance: top_back_rail
        axis: x
        side: positive
      - id: top_back_right_post_to_x_rail
        from_instance: post_back_right
        to_instance: top_back_rail_splice
        axis: x
        side: negative
      - id: top_left_front_post_to_spacer
        from_instance: post_front_left
        to_instance: frame_spacer_top_front_left_6mm
        axis: y
        side: positive
      - id: top_left_front_spacer_to_side_rail
        from_instance: frame_spacer_top_front_left_6mm
        to_instance: top_left_side_rail
        axis: y
        side: positive
      - id: top_left_back_post_to_spacer
        from_instance: post_back_left
        to_instance: frame_spacer_top_back_left_6mm
        axis: y
        side: negative
      - id: top_left_back_spacer_to_side_rail
        from_instance: frame_spacer_top_back_left_6mm
        to_instance: top_left_side_rail
        axis: y
        side: negative
      - id: top_right_front_post_to_spacer
        from_instance: post_front_right
        to_instance: frame_spacer_top_front_right_6mm
        axis: y
        side: positive
      - id: top_right_front_spacer_to_side_rail
        from_instance: frame_spacer_top_front_right_6mm
        to_instance: top_right_side_rail
        axis: y
        side: positive
      - id: top_right_back_post_to_spacer
        from_instance: post_back_right
        to_instance: frame_spacer_top_back_right_6mm
        axis: y
        side: negative
      - id: top_right_back_spacer_to_side_rail
        from_instance: frame_spacer_top_back_right_6mm
        to_instance: top_right_side_rail
        axis: y
        side: negative
      - id: bottom_left_front_post_to_spacer
        from_instance: post_front_left
        to_instance: frame_spacer_bottom_front_left_6mm
        axis: y
        side: positive
      - id: bottom_left_front_spacer_to_side_rail
        from_instance: frame_spacer_bottom_front_left_6mm
        to_instance: bottom_left_side_rail
        axis: y
        side: positive
      - id: bottom_left_back_post_to_spacer
        from_instance: post_back_left
        to_instance: frame_spacer_bottom_back_left_6mm
        axis: y
        side: negative
      - id: bottom_left_back_spacer_to_side_rail
        from_instance: frame_spacer_bottom_back_left_6mm
        to_instance: bottom_left_side_rail
        axis: y
        side: negative
      - id: bottom_right_front_post_to_spacer
        from_instance: post_front_right
        to_instance: frame_spacer_bottom_front_right_6mm
        axis: y
        side: positive
      - id: bottom_right_front_spacer_to_side_rail
        from_instance: frame_spacer_bottom_front_right_6mm
        to_instance: bottom_right_side_rail
        axis: y
