schema_version: assembly_spec.v0.1
meta:
  project: M3-CRETE
  assembly_id: m3_reference_round1
  description: >
    First photo-guided assembly target for the general CADCLAW auto-assembly
    harness. This is a rough placement spec against the reference render, not
    dimensional evidence or a release-ready machine.

active_variant: M3-2
variants:
  - id: M3-1
    label: M3-1
    envelope_mm: [1000.0, 1000.0, 1000.0]
    notes: No spliced long axis; all primary frame members are single 1000mm stock.
  - id: M3-2
    label: M3-2
    envelope_mm: [2000.0, 1000.0, 1000.0]
    notes: Current default proving build; X axis is spliced from 1000mm stock.
  - id: M3-4
    label: M3-4
    envelope_mm: [2000.0, 2000.0, 1000.0]
    notes: X and Y long axes are spliced; BOM quantities come from variant overrides.

reference_assets:
  - path: docs/M3-CRETE_render.jpg
    role: visual_reference
    dimensional_evidence: false
    notes: >
      Reference render for topology, proportions, and human review between
      assembly rounds. Exact dimensions must come from the spec and authored
      STEP assets.


connector_metadata: tasks/m3_crete/m3_connector_metadata.yaml

component_roots:
  - CAD

protected_paths:
  - CAD/M3-2_Assembly.step
  - CAD/M3-2_Assembly_latest.step
  - CAD/M3-2_Assembly-latest.step

outputs:
  step: tasks/m3_crete/m3_reference_round1.step
  views_dir: tasks/m3_crete/build/views
  report: tasks/m3_crete/build/m3_reference_round1_report.json
  design_inventory: tasks/m3_crete/build/m3_reference_round1_inventory.json
  bom: tasks/m3_crete/build/m3_reference_round1_bom.csv

bom:
  source_path: bom/data.json
  variant_config_path: config.js
  output_path: tasks/m3_crete/build/m3_reference_round1_bom.csv
  private_fields_redacted: true
  notes: >
    CADCLAW emits a model-derived design BOM from placed authored STEP
    sources, roles, and explicit generated stock/spacer declarations. The
    M3-CRETE interactive/procurement BOM remains owned by the M3 project. Use
    CADCLAW output and parity findings to propose deltas against
    bom/data.json; do not overwrite that public BOM from this
    harness. M3-2 is the current base quantity set, while M3-1 and M3-4 apply
    variant overrides from config.js. Private procurement fields must stay out
    of public CADCLAW reports.

assumptions:
  - Reference image gives topology and approximate proportions only.
  - M3-2 means a 2000 x 1000 x 1000mm target build envelope, not a claim of physical validation.
  - M3-1 and M3-4 should be generated from the same spec family by variant quantities and axis spans.
  - Round 1 prioritizes frame and visible gantry layout over exact belt/drive routing.
  - Component transforms are initial guesses pending connector metadata and review renders.
  - Complex parts are placed from authored STEP files; contextual plates/brackets are not generated.
  - "Narrow M3 exception: tasks/m3_crete/generated/ZPMM_6p1_motor_mount_spacer_6mm_holes.step is derived from the user-confirmed authored ZPMM.step only to widen the four existing motor holes to 6mm and add six 6mm C-Beam end-alignment holes from the asymmetric 4080 screw-port pattern; this is not general CADCLAW plate authoring."
  - "The assembly sequence is inside-out: X gantry spacing first, then Y gantry spacing, then Z posts and frame members that accommodate those gantries."
  - Current user guidance sets the side-rail/post frame spacer thickness to 6 mm for this CADCLAW reference round.
  - "Gantry plates by interface: the two X-axis printhead carriage plates are the C-Beam Gantry Plate XLarge (125x125x6mm), restored 2026-05-23 per the maintainer for the toolhead's off-axis forces; the two X-to-Y handoff plates, the four Y-to-Z/Z-post carriage plates, and the four top-center spreader bracket plates (a 2-plate 6mm stack at each spanner end) are the small 3mm V-Slot 20-80 (10 small total). The XLarge carriage choice intentionally diverges from the April-29 V1.0 source (zero XLarge) and is pinned in the internal frame-canon notes; do not re-correct it from the source."
  - "The 6mm spacer belongs to the static frame side-rail/post joint; it moves the frame out to accommodate the gantry, rather than being inserted between the moving gantry plate and the Z post."
  - "The 6.1mm ZPMM side-rail spacer also acts as the motor mount at the motor-mount positions; lower Y-frame side-rail joints use a simple 6 x 40 x 80mm flat spacer instead of the full ZPMM motor mount."
  - "The lower Y-direction static frame rails are 2080 V-slot, not C-Beam."
  - "The top center spreader is a 2040 extrusion mounted with a 2-plate stack of small 3mm V-Slot 20-80 plates at each end (four plates total, 6mm spacer per end) as spacer/bracket stock; the 40mm side is vertical and the top surface is level with the top frame members."
  - "Y-gantry C-Beams must place the 80mm dimension vertically and their open channels must face inward toward the printer volume; these are checked as declared orientation and bbox gates."
  - "X-gantry C-Beams must also place the 80mm dimension vertically; X-carriage wheels must sit between the carriage plates and the X-gantry rail slots, not outside the plates."
  - "Each 2m X-direction 4080 C-Beam run carries one authored 1000mm 2040 insert centered across the 4080-to-4080 splice; those inserts are explicit placed instances, not hidden reinforcement assumptions."
  - "The current reference places 32 authored Solid V Wheel STEP instances at the modeled X-to-Y, X-carriage, and Y-to-Z carriage interfaces so wheel-to-slot and wheel-to-plate location choices are visible in review renders."
  - "Axis handoffs use the same progression: place the declared gantry plate flat on the current gantry end face, reserve the declared running gap, then place the next axis outside that interface."
  - "Static frame rails are different from moving V-slot handoffs: structural C-Beam/post joints should be flush and aligned for bearing contact, not separated by clearance gaps."
  - "Future FEA checks will be decision-support only: PyNiteFEA models in the FEA folder may compare static frame member sizes and joint strategies, but they do not replace authored CAD placement or physical validation."

constraints:
  - id: no_contextual_plate_generation
    severity: fail
    rule: Do not generate contextual plates, brackets, motor mounts, NEMA hole patterns, or adapter plates from scratch.
    source: CADCLAW AGENTS.md and M3-CRETE field-test history
  - id: zpmm_one_off_derivation_scope
    severity: fail
    rule: The generated ZPMM derivative may only import the user-confirmed authored ZPMM STEP, preserve its outline and spindle opening, widen existing through-holes to 6mm, and add the declared six-hole asymmetric C-Beam end-alignment pattern; do not generalize this into CADCLAW core.
    source: user-approved one-off exception, 2026-05-21
    applies_to_variants: [M3-2]
  - id: protect_authoritative_step_exports
    severity: fail
    rule: Generated CadQuery output must not overwrite authoritative native-CAD/authored M3-2 STEP exports.
    source: CADCLAW/M3-CRETE handoff notes
  - id: no_external_x_gantry_reinforcement
    severity: fail
    rule: X-direction 2040 reinforcement must bridge the middle splice of each 2m 4080 run; X-gantry reinforcement must stay internal or below the wheel path, while external plates/gussets on the 40mm faces block the two-sided X-carriage.
    source: the project's internal design notes
    applies_to_variants: [M3-2, M3-4]
  - id: cbeam_primary_stock
    severity: warn
    rule: Gantry extrusions, Z posts, and top X frame rails use 4080 C-Beam in 1000mm stock lengths; lower Y frame rails use 2080, and the top center spreader plus centered 2m-run splice inserts use 2040 per field-build guidance.
    source: the project's internal design notes and user guidance, 2026-05-20
  - id: gantry_first_inside_out_spacing
    severity: warn
    rule: X/Y/Z gantry placement should define the required frame spacing before the surrounding frame extrusions are placed.
    source: user guidance, 2026-05-16
    applies_to_variants: [M3-2]
  - id: frame_side_spacer_6mm
    severity: warn
    rule: Static side-rail/post spacer declarations should distinguish ZPMM motor-mount spacers from the lower simple 6 x 40 x 80mm flat frame spacers.
    source: user guidance, 2026-05-16 and 2026-05-20
    applies_to_variants: [M3-2]
  - id: plate_family_by_axis_handoff
    severity: fail
    rule: The two X-axis printhead carriage plates use the C-Beam Gantry Plate XLarge (125x125x6mm) for the toolhead's off-axis forces; all other gantry plates - the two X-to-Y handoff and the four Y-to-Z/Z-post carriage - use the smaller 3mm V-Slot 20-80 plate. The XLarge carriage choice intentionally diverges from the April-29 V1.0 source (which has zero XLarge); do not re-correct it from the source.
    source: user guidance, 2026-05-23 (the maintainer - X carriage restored to XLarge for off-axis stiffness; supersedes the 2026-05-22 all-small correction for the carriage only)
    applies_to_variants: [M3-2]
  - id: vslot_axis_handoff_stackup
    severity: fail
    rule: Each V-slot axis handoff stacks current gantry end face, declared gantry plate thickness, 1mm running gap or declared spacer/tolerance budget, then the next axis; this invariant applies across V-slot/C-Beam handoffs.
    source: user guidance, 2026-05-16
    applies_to_variants: [M3-2]
  - id: static_frame_flush_adjacency
    severity: fail
    rule: Static frame members must have declared flush adjacency and enough face overlap for structural bearing; visible frame gaps are validation failures unless an authored connector or spacer STEP is declared.
    source: user guidance, 2026-05-16
    applies_to_variants: [M3-2]
  - id: y_gantry_open_channel_inward
    severity: fail
    rule: Y-gantry C-Beams must have the 80mm dimension vertical and the open channels facing inward toward the printer volume so the carriage interface and accessible channel are on the correct side.
    source: user guidance, 2026-05-20
    applies_to_variants: [M3-2]
  - id: fea_frame_member_decision_support
    severity: warn
    rule: "PyNiteFEA checks are decision-support only and must track the field-build member families: 4080 gantries/posts/top X rails, 2080 lower Y rails, and 2040 top center spreader plus centered 2m-run splice inserts."
    source: user guidance, 2026-05-16
    applies_to_variants: [M3-2, M3-4]
  - id: no_motion_endstops
    severity: fail
    rule: Do not add mechanical motion endstops or limit switches; the design uses StallGuard sensorless homing.
    source: the project's internal design notes
  - id: no_leveling_feet
    severity: fail
    rule: Do not add leveling feet; bed leveling is handled by measurement/probing.
    source: the project's internal design notes
  - id: no_nonrequested_extras
    severity: warn
    rule: Do not add HEPA filters, carbon fiber bars, LED lighting, or enclosure extras unless the spec changes explicitly.
    source: the project's internal design notes

