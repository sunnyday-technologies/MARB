      axis: x
      side: negative
      offset_mm: 1.0
      lock: axis
    notes: >
      Authored 1000mm C-Beam rail, the left Y gantry datum. X is SOLVED by the
      axis-lock resolver: its open_channel_face (inward +localX face) seats the
      1mm V-slot running gap off the left X-to-Y plate's outer face (face_y3),
      so the handoff gap falls out of the constraint instead of being hand-tuned
      (this closes the old 4mm x_to_y_left running-gap fail). The kept transform
      supplies the free axes (Y span -500, Z height 420) and rotation: 80mm
      vertical, open channel inward toward +X. The authored X (0.0) is ignored —
      the resolver overrides it. Motors, belts, and drive hardware remain
      explicit not_built_yet items.
  - id: y_gantry_right
    role: y_gantry_beam
