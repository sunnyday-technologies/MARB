assembly_sequence:
  - id: x_gantry
    title: X gantry and X-to-Y handoff plates
    instance_ids:
      - x_gantry_beam_left
      - x_gantry_beam_right
      - x_gantry_insert_center_2040
      - x_gantry_plate_left
      - x_gantry_plate_right
      - x_left_y_neg_lower_wheel
      - x_left_y_neg_upper_wheel
      - x_left_y_pos_lower_wheel
      - x_left_y_pos_upper_wheel
      - x_right_y_neg_lower_wheel
      - x_right_y_neg_upper_wheel
      - x_right_y_pos_lower_wheel
      - x_right_y_pos_upper_wheel
    notes: >
      Start with the X gantry because its end plates define where the moving
      beam has to attach to the two Y gantries. The centered 2040 insert is
      included here so the X-gantry splice reinforcement is visible in
      exploded outputs and counted in the model-derived BOM.
  - id: x_carriage
    title: X-axis printhead carriage plates and wheels
    instance_ids:
      - x_carriage_plate_front
      - x_carriage_plate_back
      - x_carriage_front_left_lower_wheel
      - x_carriage_front_left_upper_wheel
      - x_carriage_front_right_lower_wheel
      - x_carriage_front_right_upper_wheel
      - x_carriage_back_left_lower_wheel
      - x_carriage_back_left_upper_wheel
      - x_carriage_back_right_lower_wheel
      - x_carriage_back_right_upper_wheel
    notes: >
      Add the two-sided X carriage on the X gantry using two authored small
      V-Slot 20-80 gantry plates and eight authored V-wheels (wheels solved by
      the relative-placement resolver). The carriage body/toolhead interface
      remains a later authored STEP selection.
  - id: y_gantry
    title: Y gantries outside X-end interface plates
    instance_ids:
      - y_gantry_left
      - y_gantry_right
    notes: >
      The Y gantries use authored C-Beam rail datums in this round rather
      than the full actuator macro, because the macro already carries end
      hardware that clips separately declared Z-carriage plates. Motors,
      belts, and remaining Y drive hardware stay explicit not_built_yet work.
  - id: z_carriages
    title: Z-carriage plates on the Y-gantry ends
    instance_ids:
      - z_carriage_plate_front_left
      - z_carriage_plate_front_right
      - z_carriage_plate_back_left
      - z_carriage_plate_back_right
      - z_front_left_outer_lower_wheel
      - z_front_left_outer_upper_wheel
      - z_front_left_inner_lower_wheel
      - z_front_left_inner_upper_wheel
      - z_front_right_inner_lower_wheel
      - z_front_right_inner_upper_wheel
      - z_front_right_outer_lower_wheel
      - z_front_right_outer_upper_wheel
      - z_back_left_outer_lower_wheel
      - z_back_left_outer_upper_wheel
      - z_back_left_inner_lower_wheel
      - z_back_left_inner_upper_wheel
      - z_back_right_inner_lower_wheel
      - z_back_right_inner_upper_wheel
      - z_back_right_outer_lower_wheel
      - z_back_right_outer_upper_wheel
    notes: >
      The Y gantry ends attach through Z-carriage plates at the four posts.
      The 6mm spacer belongs to the static frame side-rail/post joint added
      later, so this step checks only the moving gantry plates and clearance.
  - id: z_posts
    title: Z posts that the Y gantries ride on
    instance_ids:
      - post_front_left
      - post_front_right
      - post_back_left
      - post_back_right
    notes: >
      Add the Z posts after the gantry and spacer stackup so post spacing is
      checked against the moving assembly rather than assumed first.
  - id: frame_completion
    title: Remaining frame extrusions around the gantries
    instance_ids:
      - top_front_rail
      - top_front_rail_splice
      - top_back_rail
      - top_back_rail_splice
      - top_front_insert_2040
      - top_back_insert_2040
      - top_left_side_rail
      - top_center_spreader
      - top_center_spreader_plate_front
      - top_center_spreader_plate_front_2
      - top_center_spreader_plate_back
      - top_center_spreader_plate_back_2
      - top_right_side_rail
      - bottom_left_side_rail
      - bottom_right_side_rail
      - frame_spacer_top_front_left_6mm
      - frame_spacer_top_front_right_6mm
      - frame_spacer_top_back_left_6mm
      - frame_spacer_top_back_right_6mm
      - frame_spacer_bottom_front_left_6mm
      - frame_spacer_bottom_front_right_6mm
      - frame_spacer_bottom_back_left_6mm
      - frame_spacer_bottom_back_right_6mm
    notes: >
      Complete the static open frame around the gantry stackup. The M3
      reference keeps the bottom X direction open; lower Y-direction rails are
      2080 V-slot with simple 6 x 40 x 80mm flat spacers, while the top X
      frame runs each receive one centered 2040 splice insert and the top
      center spreader is a 2040 extrusion mounted with two 3mm V-Slot 20-80
      plates.
  - id: drive_train
    title: Z-axis drive train (pulleys, return idlers, belts)
    instance_ids:
      - drive_pulley_z_front_left
