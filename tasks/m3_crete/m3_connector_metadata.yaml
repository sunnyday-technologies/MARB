schema_version: connector_metadata.v0.1
assumptions:
  - Frames are first-pass local references for LLM/CADCLAW placement, not certified mating definitions.
  - Extrusion origins are centered on the authored STEP asset unless later inspection proves otherwise.
  - Gantry plate frames need human review against rendered views before release use.
  - Y gantry, the small V-Slot 20-80 gantry plate (used at every handoff -
    X-to-Y, X-carriage, and Y-to-Z), ZPMM side-rail/post motor-mount spacer,
    simple lower flat spacer, and 2040/2080 frame-member frames are first-pass
    references from CADCLAW inspect-component bbox centers. Solid V Wheel frames
    are included for placement visibility at the modeled carriage interfaces.
    The C-Beam Gantry Plate XLarge is used for the two X-axis printhead carriage
    plates only (Nick's off-axis-force requirement, 2026-05-23) and intentionally
    diverges from the V1.0 source's 0-XLarge; the X-to-Y handoff and Y-to-Z
    carriage plates remain the small V-Slot 20-80.

components:
  # (Removed the dead `vslot_20x80_1000` component 2026-05-23: it duplicated
  # `vslot_2080_1000`'s source_path with stale centered-rail frames (origins at
  # +/-500, but inspect-component shows the STEP is Z 0..1000). Nothing referenced
  # it; the bottom Y rails use vslot_2080_1000.)
  - id: cbeam_40x80_1000
    source_path: CAD/Advanced/Linear Rail/C-Beam 40x80x1000 Linear Rail.step
    notes: Primary 4080 C-Beam stock for M3 frame and gantry slices.
    frames:
      - id: negative_x_end
        kind: extrusion_end
        origin_mm: [-500.0, 0.0, 0.0]
        x_axis: [-1.0, 0.0, 0.0]
        tags: [rail_end, splice_candidate]
      - id: positive_x_end
        kind: extrusion_end
        origin_mm: [500.0, 0.0, 0.0]
        x_axis: [1.0, 0.0, 0.0]
        tags: [rail_end, splice_candidate]
      - id: c_opening_side
        kind: rail_slot
        origin_mm: [0.0, 0.0, 0.0]
        x_axis: [1.0, 0.0, 0.0]
        tags: [cbeam_opening, inward_facing]
        notes: >
          Local open-channel side; the channel opens toward +local-X (verified by
          inspect-component: bbox X -20..20, and consistent with open_channel_face
          at +20 and the open_channel_orientation gate's local_open_axis [1,0,0]).
          Descriptive reference; the resolver uses open_channel_face/axis_center.
      - id: z_end_a
        kind: extrusion_end
        origin_mm: [0.0, 0.0, 0.0]
        z_axis: [0.0, 0.0, -1.0]
        tags: [rail_end, resolver_datum]
        notes: >
          True local long-axis end of the authored STEP, inspected as Z 0..1000
          (cross-section 40mm X by 80mm Y). The legacy negative_x_end frame above
          assumed an X long axis and does not match the asset; the resolver uses
          z_end_a/z_end_b for relative placement.
      - id: z_end_b
        kind: extrusion_end
        origin_mm: [0.0, 0.0, 1000.0]
        z_axis: [0.0, 0.0, 1.0]
        tags: [rail_end, resolver_datum]
        notes: Far local long-axis end (Z = 1000mm) from inspect-component bbox.
      - id: axis_center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [resolver, axis_center]
        notes: >
          Cross-section centroid on the long axis (inspect-component bbox is
          X -20..20, Y -40..40). Used as the parent datum for axis-locked
          carriage plates that ride centered on the rail (offset 0).
      - id: open_channel_face
        kind: mount_face
        origin_mm: [20.0, 0.0, 0.0]
        x_axis: [1.0, 0.0, 0.0]
        tags: [resolver, cbeam_opening, inward_facing]
        notes: >
          Local +X cross-section face (the open-channel side, 40mm width so the
          face is at +20mm). This is the rail face that meets the X-to-Y plate;
          the axis-locked Y-gantry seats this frame the 1mm running gap off the
          plate's outer face.

  - id: vslot_gantry_plate_20_80
    source_path: CAD/Components/Plates/V-Slot Gantry Plate 20-80mm.step
    notes: Smaller 3mm, roughly 125 x 80mm authored gantry plate used for Y-to-Z/Z-post carriage interfaces; hole pattern is not generated by CADCLAW.
    frames:
      - id: plate_center
        kind: mount_face
        origin_mm: [0.0, 0.0, 0.0]
        tags: [gantry_plate, center]
      - id: wheel_contact_plane
        kind: wheel_contact
        origin_mm: [0.0, 0.0, 0.0]
        tags: [gantry_plate]
      # --- Resolver frames (inspect-component: thin axis is local Y 0..3mm, the
      # 127 x 88 face lies in local X-Z; wheel-mount holes bored through Y). The
      # two faces let either side of the X-to-Y handoff seat its inner face on
      # the beam end; wheel holes are duplicated on both faces because the wheels
      # ride the outer face, which is local Y=3 on one side and Y=0 on the other.
      - id: face_y0
        kind: mount_face
        origin_mm: [0.0, 0.0, 0.0]
        tags: [gantry_plate, seat_face, resolver]
      - id: face_y3
        kind: mount_face
        origin_mm: [0.0, 3.0, 0.0]
        tags: [gantry_plate, seat_face, resolver]
      - id: hole_y3_yneg_lower
        kind: wheel_contact
        origin_mm: [-29.85, 3.0, -30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y3_yneg_upper
        kind: wheel_contact
        origin_mm: [-29.85, 3.0, 30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y3_ypos_lower
        kind: wheel_contact
        origin_mm: [29.85, 3.0, -30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y3_ypos_upper
        kind: wheel_contact
        origin_mm: [29.85, 3.0, 30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y0_yneg_lower
        kind: wheel_contact
        origin_mm: [-29.85, 0.0, -30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y0_yneg_upper
        kind: wheel_contact
        origin_mm: [-29.85, 0.0, 30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y0_ypos_lower
        kind: wheel_contact
        origin_mm: [29.85, 0.0, -30.32]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_y0_ypos_upper
        kind: wheel_contact
        origin_mm: [29.85, 0.0, 30.32]
        tags: [gantry_plate, wheel_hole, resolver]

  - id: cbeam_gantry_plate_xlarge
    source_path: CAD/Advanced/Plates/C-Beam Gantry Plate XLarge.STEP
    notes: >
      125 x 125 x 6mm C-Beam gantry plate. Used for the two X-axis printhead
      CARRIAGE plates only, per Nick's off-axis-force requirement (2026-05-23):
      the toolhead carriage needs the stiffer, larger plate. This intentionally
      diverges from the V1.0 source (which has 0 XLarge) — do NOT re-correct from
      the source. The X-to-Y handoff and Y-to-Z carriage plates stay the small
      V-Slot 20-80. inspect-component bbox: X/Y -62.5..62.5, Z 0..6 (thin axis
      local Z); the four wheel-mount holes are at local (+/-30, +/-30) through Z.
    frames:
      - id: plate_center
        kind: mount_face
        origin_mm: [0.0, 0.0, 3.0]
        tags: [gantry_plate, center]
      # Seat faces (the 6mm thin axis is local Z 0..6) and the four wheel-mount
      # holes duplicated on each face, so either carriage plate can seat its
      # beam-side face inward and ride wheels off it (front uses the z6 face,
      # back uses the z0 face after the [-90,0,0] orientation).
      - id: face_z0
        kind: mount_face
        origin_mm: [0.0, 0.0, 0.0]
        tags: [gantry_plate, seat_face, resolver]
      - id: face_z6
        kind: mount_face
        origin_mm: [0.0, 0.0, 6.0]
        tags: [gantry_plate, seat_face, resolver]
      - id: hole_z6_xneg_yneg
        kind: wheel_contact
        origin_mm: [-30.0, -30.0, 6.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z6_xneg_ypos
        kind: wheel_contact
        origin_mm: [-30.0, 30.0, 6.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z6_xpos_yneg
        kind: wheel_contact
        origin_mm: [30.0, -30.0, 6.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z6_xpos_ypos
        kind: wheel_contact
        origin_mm: [30.0, 30.0, 6.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z0_xneg_yneg
        kind: wheel_contact
        origin_mm: [-30.0, -30.0, 0.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z0_xneg_ypos
        kind: wheel_contact
        origin_mm: [-30.0, 30.0, 0.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z0_xpos_yneg
        kind: wheel_contact
        origin_mm: [30.0, -30.0, 0.0]
        tags: [gantry_plate, wheel_hole, resolver]
      - id: hole_z0_xpos_ypos
        kind: wheel_contact
        origin_mm: [30.0, 30.0, 0.0]
        tags: [gantry_plate, wheel_hole, resolver]

  - id: solid_v_wheel_standard
    source_path: CAD/Components/Wheels/Solid V Wheel.step
    notes: Standard solid V-wheel reference for M3. Inspected envelope is 10.2 x 23.9 x 23.9 mm. The current reference places 32 wheels at modeled X-to-Y, X-carriage, and Y-to-Z carriage interfaces, four per gantry plate, with centers aligned to authored plate holes and a 7mm plate-face standoff for the spacer/washer stack.
    frames:
      - id: wheel_center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [wheel, v_wheel, standard, solid]
      # Inspected envelope 10.2mm along local X (the hub axis); the two hub
      # faces are at +/-5.1. The resolver seats the face that points at the plate
      # onto a plate wheel-hole frame, plus the declared standoff, so the
      # plate-face-to-wheel-inner-face distance falls out as offset_mm.
      - id: hub_seat_pos_x
        kind: wheel_contact
        origin_mm: [5.1, 0.0, 0.0]
        tags: [wheel, v_wheel, hub_face, resolver]
      - id: hub_seat_neg_x
        kind: wheel_contact
        origin_mm: [-5.1, 0.0, 0.0]
        tags: [wheel, v_wheel, hub_face, resolver]

  - id: vslot_2080_1000
    source_path: CAD/Components/V-Slot/V-Slot 20x80x1000 Linear Rail.step
    notes: Active lower Y-direction static frame rail for the M3-2 reference.
    frames:
      - id: negative_z_end
        kind: extrusion_end
        origin_mm: [0.0, 0.0, 0.0]
        z_axis: [0.0, 0.0, -1.0]
        tags: [rail_end, lower_y_frame, active_reference]
      - id: positive_z_end
        kind: extrusion_end
        origin_mm: [0.0, 0.0, 1000.0]
        z_axis: [0.0, 0.0, 1.0]
        tags: [rail_end, lower_y_frame, active_reference]

  - id: vslot_2040_1000
    source_path: CAD/Components/V-Slot/V-Slot 20x40x1000 Linear Rail.step
    notes: Active 2040 stock for the M3-2 reference; one instance is the top center spreader, one is the centered X-gantry splice insert, and two are centered top X-frame splice inserts.
    frames:
      - id: negative_z_end
        kind: extrusion_end
        origin_mm: [0.0, 0.0, 0.0]
        z_axis: [0.0, 0.0, -1.0]
        tags: [rail_end, top_center_spreader, active_reference]
      - id: positive_z_end
        kind: extrusion_end
        origin_mm: [0.0, 0.0, 1000.0]
        z_axis: [0.0, 0.0, 1.0]
        tags: [rail_end, top_center_spreader, active_reference]

  - id: zpmm_motor_mount_spacer
    source_path: examples/m3_crete/generated/ZPMM_6p1_motor_mount_spacer_6mm_holes.step
    notes: One-off M3 derivative of the user-confirmed authored ZPMM STEP. The outline and motor-spindle opening are preserved; four existing motor holes and the six asymmetric 4080 C-Beam end-alignment screw-port holes are 6mm through-holes.
    frames:
      - id: native_center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [zpmm, motor_mount, frame_side, derived_from_authored_step, native_mm_scale]
      - id: normalized_center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [zpmm, motor_mount, frame_side, derived_from_authored_step, centered_source]

  - id: m3_flat_frame_spacer_6mm
    source_path: examples/m3_crete/generated/M3_6mm_frame_shim_4080.step
    notes: Simple 6 x 40 x 80mm lower Y-rail/post spacer, no holes or contextual bolt pattern.
    frames:
      - id: spacer_center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [flat_spacer, lower_y_frame, generated_simple_fixture, active_reference]

  # --- Drive-train parts: each carries a center reference frame so the placed
  # cosmetic drive geometry (pulleys, idlers, belts, motors, belt-pinion) is
  # covered by connector metadata. These are first-pass/absolute placements, not
  # resolver-driven; the center frame is a placeholder until (if ever) a real
  # mount/shaft frame is needed.
  - id: gt2_pulley_20t
    source_path: CAD/Components/Pulleys/GT2 Timing Pulley 20 Tooth.step
    notes: GT2 20-tooth Z-drive pulley (one per post).
    frames:
      - id: center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [drive, pulley, center]
  - id: smooth_idler_wheel
    source_path: CAD/Components/Pulleys/Smooth Idler Pulley Wheel.step
    notes: Smooth return idler (one per post bottom).
    frames:
      - id: center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [drive, idler, center]
  - id: gt2_belt_z_stock
    source_path: examples/m3_crete/generated/M3_GT2_belt_Z_942mm.step
    notes: Cosmetic GT2 Z-belt run extracted from the V1.0 source (gate-exempt).
    frames:
      - id: center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [drive, belt, center]
  - id: gt2_belt_y_stock
    source_path: examples/m3_crete/generated/M3_GT2_belt_Y_958mm.step
    notes: Cosmetic GT2 Y-belt run, routed inside the Y-gantry channel (gate-exempt).
    frames:
      - id: center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [drive, belt, center]
  - id: nema23_motor
    source_path: examples/m3_crete/generated/M3_NEMA23_motor.step
    notes: NEMA 23 stepper - one shared model placed seven times in the assembly (oriented per-instance via rotate_deg). Source-recentered; center frame only.
    frames:
      - id: center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [drive, motor, center]
  - id: vs_belt_pinion
    source_path: examples/m3_crete/VS_Belt_Pinion.step
    notes: User-authored full-length X-axis belt-pinion (2m GT2 belt + pulley).
    frames:
      - id: center
        kind: reference
        origin_mm: [0.0, 0.0, 0.0]
        tags: [drive, belt_pinion, center]

mates:
  - id: top_front_splice_reference
    kind: align
    from_instance: top_front_rail
    from_frame: positive_x_end
    to_instance: top_front_rail_splice
    to_frame: negative_x_end
    notes: First-pass declared splice relationship; hardware/connector parts are not placed yet.
  - id: x_left_plate_to_y_left_plate_reference
    kind: align
    from_instance: x_gantry_plate_left
    from_frame: plate_center
    to_instance: y_gantry_left
    to_frame: c_opening_side
    notes: First-pass reference showing X-gantry end plate handoff to the left Y gantry with the V-slot running gap.
  - id: x_right_plate_to_y_right_plate_reference
    kind: align
    from_instance: x_gantry_plate_right
    from_frame: plate_center
    to_instance: y_gantry_right
    to_frame: c_opening_side
    notes: First-pass reference showing X-gantry end plate handoff to the right Y gantry with the V-slot running gap.
