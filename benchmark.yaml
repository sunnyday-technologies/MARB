schema_version: m3_ai_assembly_benchmark.v0.1
benchmark_id: m3_ai_assembly
status: prerelease_scaffold

target:
  project: M3-CRETE
  variant: M3-2
  target_envelope_mm: [2000.0, 1000.0, 1000.0]
  interpretation: achievable PRINT/BUILD VOLUME, not the machine's outer size; the frame, rails, gantry, Z-posts and end mounts extend beyond it, so a correct machine is physically larger than these numbers. Not a scoring bound; requires physical validation.
  fixture_constraints:
    - open bottom frame in X direction; no bottom X rails
    - lower Y static frame rails are 2080 V-slot
    - top center spreader is 2040 V-slot with 40 mm side vertical and top face level with top frame
    - Y-gantry C-Beams place the 80 mm dimension vertically and open channels face inward
    - X-gantry C-Beams place the 80 mm dimension vertically and include one centered 1000 mm 2040 insert across the 2 m X-gantry splice
    - top X-direction frame C-Beam runs each include one centered 1000 mm 2040 insert across the 2 m frame splice
    - the two-sided X-axis printhead carriage uses two C-Beam Gantry Plate XLarge (125x125x6 mm), for the toolhead's off-axis forces; the X-to-Y handoff and Y-to-Z/Z-post carriage plates use the small V-Slot 20-80 (10 small + 2 XLarge). This intentionally diverges from the V1.0 source's zero-XLarge.
    - the top center spreader is mounted with a 2-plate (6 mm) stack of small V-Slot 20-80 plates at each end (four plates total)
    - the Y-axis GT2 belts run inside the Y-gantry C-beam channels; the X drive is the authored VS_Belt_Pinion (no separate X belt); the Y-motor screws directly to the C-beam (no mount plate) and homing is sensorless via the stepper driver's StallGuard, so there is no physical endstop part
    - Solid V Wheel STEP instances are placed at modeled X-to-Y, X-carriage, and Y-to-Z carriage interfaces; four wheels per gantry plate align to authored plate holes with a 7 mm spacer/washer standoff
    - CADCLAW model BOM is compared against, not written over, the M3 interactive BOM

tracks:
  - id: native_cad_driver
    label: Native CAD driver
    primary_artifact: native-authored/exported STEP assembly
  - id: cadclaw_spec_driver
    label: CADCLAW spec driver
    primary_artifact: CADCLAW-generated STEP plus spec, inventory, and report

seeds:
  assembly_spec: tasks/m3_crete/m3_reference_assembly.yaml
  connector_metadata: tasks/m3_crete/m3_connector_metadata.yaml
  prompt: prompts/standard_prompt.md

driver_briefs:
  cadquery: prompts/CADQUERY_DRIVER_BRIEF.md
  fusion: prompts/FUSION_DRIVER_BRIEF.md

asset_policy:
  public_assets_included: true
  kit_license: kits/LICENSE.md
  notes:
    - The blind kits (kits/*.zip) bundle each part's license: OpenBuilds-derived parts under CC BY-SA 4.0 with attribution, Sunnyday-authored parts under the repo MIT license. See kits/LICENSE.md.
    - Private procurement fields and credentials must never appear in benchmark manifests.

grader:
  default_dry_run: true
  default_render_views: true
  required_report_schema: "0.7"
  hard_fail_finding_ids:
    - assemble.protected_output_path
    - assemble.generated_geometry_blocked
    - assemble.source_missing
    - assemble.step_missing_for_render
  hard_fail_categories:
    - publish_audit
  required_outputs:
    - step_or_dry_run_plan
    - design_inventory
    - cadclaw_report
    - review_views_for_non_dry_run

scoring:
  # human_effort removed (prerelease): effort/autonomy -- interventions, retries,
  # wall-time, tokens -- is measured and reported from the run log
  # (summarize_run_log.py), not weighted into the artifact score. The remaining
  # five weights are renormalized (x100/90) to sum to 100, preserving their ratios.
  weights:
    cadclaw_gate_results: 39
    completeness_and_authored_asset_fidelity: 28
    dimensional_topology_match: 17
    reproducibility_and_provenance: 11
    claim_hygiene_packaging: 5
  hard_fail_notes:
    - Secret exposure, protected-path overwrite, non-loadable STEP, or uncontrolled generated contextual geometry overrides weighted score.
    - The early scorer is intentionally conservative and should be version-pinned with each benchmark release.

# ---------------------------------------------------------------------------
# Full-stack ARB scale (cumulative). 100 = a fully autonomous assembly system
# (rung L7). The current grader measures L0 (component truth) + L1 (assembly
# correctness); L2-L7 are not yet gate-verified, so a flawless build today earns
# only ~15/100 -- deliberately honest about how early this is on the road to
# autonomous assembly. The 'scoring.weights' above grade the QUALITY of L1; that
# L1 sub-grade (0-100%) scales into L1's point allocation here.
full_stack_ladder:
  total: 100
  currently_scored: [L0, L1]
  rungs:
    - {id: L0, label: Component truth,                       points: 5,  status: measured}
    - {id: L1, label: Assemble the kit,                      points: 10, status: measured}
    - {id: L2, label: Constraint-robust assembly,            points: 12, status: emerging}
    - {id: L3, label: Mechanically valid (kinematics + FEA), points: 15, status: partial}
    - {id: L4, label: Engineering change,                    points: 15, status: open}
    - {id: L5, label: Design from intent,                    points: 15, status: open}
    - {id: L6, label: Optimize and invent,                   points: 14, status: open}
    - {id: L7, label: Autonomous certified loop,             points: 14, status: open}
